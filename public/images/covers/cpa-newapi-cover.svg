<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712"/>
      <stop offset="0.48" stop-color="#071426"/>
      <stop offset="1" stop-color="#140A20"/>
    </linearGradient>
    <radialGradient id="cyanGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1170 200) rotate(90) scale(280 420)">
      <stop stop-color="#38BDF8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pinkGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1330 160) rotate(90) scale(240 320)">
      <stop stop-color="#F472B6" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#F472B6" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="flowLine" x1="320" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.5" stop-color="#60A5FA"/>
      <stop offset="1" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#334155"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrowHead" markerWidth="18" markerHeight="18" refX="12" refY="9" orient="auto">
      <path d="M0 0L18 9L0 18V0Z" fill="#F472B6"/>
    </marker>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#1E293B" stroke-width="1" opacity="0.55"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="900" rx="36" fill="url(#grid)" opacity="0.32"/>
  <rect x="56" y="56" width="1488" height="788" rx="28" stroke="#1E293B" stroke-width="1.5" opacity="0.9"/>
  <ellipse cx="1180" cy="220" rx="330" ry="220" fill="url(#cyanGlow)"/>
  <ellipse cx="1340" cy="170" rx="240" ry="190" fill="url(#pinkGlow)"/>

  <g opacity="0.88">
    <text x="104" y="122" fill="#7DD3FC" font-family="'Geist Mono', monospace" font-size="24" letter-spacing="4">SWRITED / AGENT INFRA / REQUEST FLOW</text>
    <text x="104" y="228" fill="#F8FAFC" font-family="'Geist', 'PingFang SC', sans-serif" font-size="78" font-weight="700">CPA + NewAPI</text>
    <text x="104" y="300" fill="#CBD5E1" font-family="'Geist', 'PingFang SC', sans-serif" font-size="34">统一入口、代理核心与上游模型之间的真实链路</text>
  </g>

  <g transform="translate(104 364)">
    <rect width="512" height="148" rx="24" fill="#0A1322" stroke="#203044"/>
    <rect x="26" y="28" width="10" height="92" rx="5" fill="url(#flowLine)"/>
    <text x="60" y="62" fill="#7DD3FC" font-family="'Geist Mono', monospace" font-size="18" letter-spacing="2">FLOW SIGNAL</text>
    <text x="60" y="102" fill="#F8FAFC" font-family="'Geist', 'PingFang SC', sans-serif" font-size="30" font-weight="600">client → newapi → cpa → upstream</text>
    <text x="60" y="132" fill="#94A3B8" font-family="'Geist', 'PingFang SC', sans-serif" font-size="22">入口、转发、供应商三层分离，出问题时能逐层定位。</text>
  </g>

  <g filter="url(#shadow)">
    <g transform="translate(180 610)">
      <rect width="228" height="120" rx="22" fill="#0B1220"/>
      <rect x="0.75" y="0.75" width="226.5" height="118.5" rx="21.25" fill="#0F1B31" fill-opacity="0.72" stroke="#334155" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="7" fill="#7DD3FC"/>
      <text x="56" y="40" fill="#7DD3FC" font-family="'Geist Mono', monospace" font-size="16" letter-spacing="1.8">CLIENT</text>
      <text x="28" y="78" fill="#F8FAFC" font-family="'Geist', sans-serif" font-size="30" font-weight="600">Hermes</text>
      <text x="28" y="102" fill="#94A3B8" font-family="'Geist', sans-serif" font-size="18">requests · tools · routing</text>
    </g>

    <g transform="translate(470 610)">
      <rect width="258" height="120" rx="22" fill="#071927"/>
      <rect x="0.75" y="0.75" width="256.5" height="118.5" rx="21.25" fill="#0B2233" fill-opacity="0.78" stroke="#38BDF8" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="7" fill="#38BDF8"/>
      <text x="56" y="40" fill="#7DD3FC" font-family="'Geist Mono', monospace" font-size="16" letter-spacing="1.8">ENTRY</text>
      <text x="28" y="78" fill="#F8FAFC" font-family="'Geist', sans-serif" font-size="32" font-weight="600">NewAPI</text>
      <text x="28" y="102" fill="#BAE6FD" font-family="'Geist', sans-serif" font-size="18">auth · model map · api surface</text>
    </g>

    <g transform="translate(790 610)">
      <rect width="258" height="120" rx="22" fill="#091A16"/>
      <rect x="0.75" y="0.75" width="256.5" height="118.5" rx="21.25" fill="#0F1F1D" fill-opacity="0.82" stroke="#34D399" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="7" fill="#34D399"/>
      <text x="56" y="40" fill="#86EFAC" font-family="'Geist Mono', monospace" font-size="16" letter-spacing="1.8">PROXY</text>
      <text x="28" y="78" fill="#F8FAFC" font-family="'Geist', sans-serif" font-size="32" font-weight="600">CPA</text>
      <text x="28" y="102" fill="#BBF7D0" font-family="'Geist', sans-serif" font-size="18">transport · retries · upstream routing</text>
    </g>

    <g transform="translate(1110 610)">
      <rect width="258" height="120" rx="22" fill="#1A0E19"/>
      <rect x="0.75" y="0.75" width="256.5" height="118.5" rx="21.25" fill="#251624" fill-opacity="0.82" stroke="#F472B6" stroke-width="1.5"/>
      <circle cx="34" cy="34" r="7" fill="#F472B6"/>
      <text x="56" y="40" fill="#F9A8D4" font-family="'Geist Mono', monospace" font-size="16" letter-spacing="1.8">UPSTREAM</text>
      <text x="28" y="78" fill="#F8FAFC" font-family="'Geist', sans-serif" font-size="32" font-weight="600">Model APIs</text>
      <text x="28" y="102" fill="#FBCFE8" font-family="'Geist', sans-serif" font-size="18">provider endpoints · inference</text>
    </g>
  </g>

  <g filter="url(#softGlow)">
    <path d="M408 670H470" stroke="url(#flowLine)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <path d="M728 670H790" stroke="url(#flowLine)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHead)"/>
    <path d="M1048 670H1110" stroke="url(#flowLine)" stroke-width="8" stroke-linecap="round" marker-end="url(#arrowHead)"/>
  </g>

  <g opacity="0.9">
    <rect x="1196" y="374" width="244" height="166" rx="22" fill="#08111D" stroke="#1E293B"/>
    <text x="1226" y="418" fill="#E2E8F0" font-family="'Geist', sans-serif" font-size="24" font-weight="600">Edge Notes</text>
    <text x="1226" y="456" fill="#94A3B8" font-family="'Geist Mono', monospace" font-size="16">01   single public entry</text>
    <text x="1226" y="486" fill="#94A3B8" font-family="'Geist Mono', monospace" font-size="16">02   proxy core separated</text>
    <text x="1226" y="516" fill="#94A3B8" font-family="'Geist Mono', monospace" font-size="16">03   upstream providers abstracted</text>
  </g>
</svg>